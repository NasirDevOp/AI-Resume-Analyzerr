<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeAI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #18181f;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #e8e8f0; --text-muted: #7a7a90; --text-dim: #4a4a60;
      --accent: #b8ff57; --red: #f87171; --green: #4ade80;
      --font-d: 'Syne', sans-serif; --font-b: 'DM Sans', sans-serif; --font-m: 'DM Mono', monospace;
      --r: 14px;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-b);
           min-height: 100vh; display: flex; flex-direction: column; align-items: center;
           justify-content: center; padding: 24px; overflow-x: hidden; }

    /* blobs */
    .blob { position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.2; pointer-events: none; }
    .blob1 { width: 500px; height: 500px; background: radial-gradient(circle,#1a3a1a,transparent); top:-150px; left:-100px; animation: bf1 18s ease-in-out infinite; }
    .blob2 { width: 400px; height: 400px; background: radial-gradient(circle,#0a2040,transparent); bottom:-100px; right:-100px; animation: bf2 22s ease-in-out infinite; }
    @keyframes bf1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-20px)} }
    @keyframes bf2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,25px)} }

    .auth-wrap { position: relative; z-index: 10; width: 100%; max-width: 420px; }

    /* Logo */
    .logo { display:flex; align-items:center; gap:10px; justify-content:center;
            font-family:var(--font-d); font-weight:800; font-size:22px; margin-bottom:36px; }
    .logo-mark { color:var(--accent); animation: spin 8s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; }

    /* Tabs */
    .tabs { display:flex; background:var(--surface2); border-radius: 10px; padding:4px; margin-bottom:28px; gap:4px; }
    .tab { flex:1; padding:9px; text-align:center; border-radius:7px; font-family:var(--font-d);
           font-weight:700; font-size:13px; cursor:pointer; color:var(--text-muted);
           transition:all 0.3s ease; border:none; background:transparent; }
    .tab.active { background:var(--accent); color:#0a0a0f; }

    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-family:var(--font-m); font-size:11px;
                        text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted); margin-bottom:8px; }
    .form-group input { width:100%; background:var(--surface2); border:1px solid var(--border);
                        border-radius:10px; color:var(--text); font-family:var(--font-b); font-size:14px;
                        padding:12px 16px; outline:none; transition:border-color 0.3s; }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-dim); }

    .submit-btn { width:100%; background:var(--accent); color:#0a0a0f; font-family:var(--font-d);
                  font-weight:700; font-size:15px; border:none; border-radius:100px; padding:14px;
                  cursor:pointer; transition:all 0.3s; margin-top:8px; }
    .submit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(184,255,87,0.35); }
    .submit-btn:active { transform:translateY(0); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

    .error-msg { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25);
                 color:var(--red); border-radius:10px; padding:12px 16px; font-size:13px;
                 margin-bottom:16px; display:none; }
    .error-msg.show { display:block; animation:fadeIn 0.3s ease; }

    .form-panel { display:none; }
    .form-panel.active { display:block; animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .footer-note { text-align:center; margin-top:24px; font-size:12px; color:var(--text-dim);
                   font-family:var(--font-m); }
    
    .features { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:28px; }
    .feature { background:var(--surface2); border:1px solid var(--border); border-radius:10px;
               padding:12px; font-size:12px; color:var(--text-muted); text-align:center; }
    .feature-icon { font-size:18px; margin-bottom:4px; }

    @media(max-width:480px) { .auth-card{padding:24px;} .features{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="auth-wrap">
    <div class="logo">
      <span class="logo-mark">▲</span>
      <span>ResumeAI</span>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <!-- Login -->
      <div class="form-panel active" id="loginPanel">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password"/>
        </div>
        <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
      </div>

      <!-- Register -->
      <div class="form-panel" id="registerPanel">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="johndoe" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@email.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password"/>
        </div>
        <button class="submit-btn" id="registerBtn" onclick="doRegister()">Create Account →</button>
      </div>
    </div>

    <div class="features">
      <div class="feature"><div class="feature-icon">📊</div>ATS Score</div>
      <div class="feature"><div class="feature-icon">🔑</div>Keyword Gap</div>
      <div class="feature"><div class="feature-icon">🕐</div>Analysis History</div>
      <div class="feature"><div class="feature-icon">📄</div>PDF Reports</div>
    </div>

    <div class="footer-note">No data stored after analysis · Free to use</div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Panel').classList.add('active');
      clearError();
    }
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
    }
    function clearError() {
      document.getElementById('errorMsg').classList.remove('show');
    }
    async function doLogin() {
      clearError();
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!email || !password) { showError('Please fill all fields.'); return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.error) { showError(data.error); btn.disabled = false; btn.textContent = 'Sign In →'; }
        else { window.location.href = '/'; }
      } catch(e) { showError('Network error. Try again.'); btn.disabled = false; btn.textContent = 'Sign In →'; }
    }
    async function doRegister() {
      clearError();
      const btn = document.getElementById('registerBtn');
      const username = document.getElementById('regUsername').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      if (!username || !email || !password) { showError('Please fill all fields.'); return; }
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/api/register', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, email, password})
        });
        const data = await res.json();
        if (data.error) { showError(data.error); btn.disabled = false; btn.textContent = 'Create Account →'; }
        else { window.location.href = '/'; }
      } catch(e) { showError('Network error. Try again.'); btn.disabled = false; btn.textContent = 'Create Account →'; }
    }
    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginPanel').classList.contains('active')) doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
